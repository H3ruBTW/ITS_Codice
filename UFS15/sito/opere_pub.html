<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opere</title>
    <link href="css/opere_pub.css" rel="stylesheet">
    <script src="js/crea_card_pub.js" defer></script>
</head>
<body>
    <main class="main">
        <div class="div-vert-nav">
            <div class="top">
                <img class="logo-img" src="img/logo.png" alt="logo">
                <nav class="nav_bar">
                    <a><button>Home</button></a>
                    <a><button>Opere</button></a>
                    <a><button>Mostre/Eventi</button></a>
                </nav>
            </div>
            <div class="div-others">
                <a><button>Account</button></a>
            </div>
        </div>
        <div class="main-opere">
            <div class="filter">
                <div class="add-search">
                    <div>
                        <label>Barra di ricerca</label>
                        <input type="text">
                    </div>
                    <div>
                        <button id="search">Applica filtri</button>
                    </div>
                    
                </div>
                <div class="other-filters">
                    <div>
                        <label>Autore</label>
                        <input type="text">
                    </div>
                    <div>
                        <label>Anno Creazione da</label>
                        <input type="number">
                    </div>
                    <div>
                        <label>Anno Creazione a</label>
                        <input type="number">
                    </div>
                    
                </div>
            </div>
            <div class="opere-wrapper">
                
            </div>
        </div>
